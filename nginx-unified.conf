# Unified Nginx Configuration for Headless API and Marketplace Frontend
server {
    listen 80;
    server_name marketplace.com api.marketplace.com;
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name api.marketplace.com;

    ssl_certificate /etc/letsencrypt/live/marketplace.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/marketplace.com/privkey.pem;

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # CORS for Tenant Frontends
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
    }
}

server {
    listen 443 ssl http2;
    server_name marketplace.com;

    ssl_certificate /etc/letsencrypt/live/marketplace.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/marketplace.com/privkey.pem;

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
    }
}
