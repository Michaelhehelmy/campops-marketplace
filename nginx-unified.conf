# Unified Nginx Configuration for Headless API and Marketplace Frontend
server {
    listen 80;
    server_name sinaicamps.com api.sinaicamps.com *.sinaicamps.com;

    # Redirect raw IP visits to secure domain
    if ($host ~* "^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$") {
        return 301 https://sinaicamps.com$request_uri;
    }

    # Redirect subdomains and custom domains preserving the host
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.sinaicamps.com;

    ssl_certificate /etc/letsencrypt/live/sinaicamps.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sinaicamps.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://challenges.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' data: https://fonts.gstatic.com; frame-src 'self' https://challenges.cloudflare.com; connect-src 'self' https://*.sinaicamps.com;" always;

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Prevent Cloudflare from caching API responses
        add_header Cache-Control 'no-store, no-cache, must-revalidate' always;
        add_header Pragma 'no-cache' always;

        # CORS for Tenant Frontends
        add_header 'Access-Control-Allow-Origin' 'https://sinaicamps.com' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;

        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }
}

