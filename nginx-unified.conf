# Unified Nginx Configuration for Headless API and Marketplace Frontend
server {
    listen 80;
    server_name sinaicamps.com api.sinaicamps.com *.sinaicamps.com;

    # Redirect raw IP visits to secure domain
    if ($host ~* "^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$") {
        return 301 https://sinaicamps.com$request_uri;
    }

    # Redirect subdomains and custom domains preserving the host
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.sinaicamps.com;

    ssl_certificate /etc/letsencrypt/live/sinaicamps.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sinaicamps.com/privkey.pem;

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Prevent Cloudflare from caching API responses
        add_header Cache-Control 'no-store, no-cache, must-revalidate' always;
        add_header Pragma 'no-cache' always;

        # CORS for Tenant Frontends
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;

        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }
}

server {
    listen 443 ssl http2;
    server_name sinaicamps.com;

    ssl_certificate /etc/letsencrypt/live/sinaicamps.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sinaicamps.com/privkey.pem;

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
    }
}
