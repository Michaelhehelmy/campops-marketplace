<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #fafaf9;
        color: #1c1917;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        gap: 0;
      }

      .card {
        background: #ffffff;
        border: 1px solid #e7e5e4;
        border-radius: 1.25rem;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
        padding: 2.5rem 2rem;
        max-width: 420px;
        width: 100%;
        text-align: center;
      }

      .icon-wrap {
        width: 72px;
        height: 72px;
        border-radius: 20px;
        background: #fff7ed;
        border: 1px solid #fed7aa;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 1.5rem;
      }

      .icon-wrap svg {
        width: 36px;
        height: 36px;
        color: #c2410c;
      }

      h1 {
        font-size: 1.375rem;
        font-weight: 700;
        letter-spacing: -0.02em;
        color: #0c0a09;
        margin-bottom: 0.5rem;
      }

      p {
        font-size: 0.9375rem;
        color: #78716c;
        line-height: 1.6;
        margin-bottom: 1.75rem;
      }

      .pill-row {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        justify-content: center;
        margin-bottom: 2rem;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        gap: 0.375rem;
        font-size: 0.75rem;
        font-weight: 500;
        padding: 0.25rem 0.75rem;
        border-radius: 99px;
        background: #fef3c7;
        color: #92400e;
        border: 1px solid #fde68a;
      }

      .pill svg {
        width: 12px;
        height: 12px;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        background: #b45309;
        color: #fff;
        border: none;
        border-radius: 0.75rem;
        padding: 0.625rem 1.5rem;
        font-size: 0.9375rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s;
        text-decoration: none;
      }

      .btn:hover {
        background: #92400e;
      }
      .btn svg {
        width: 16px;
        height: 16px;
      }

      .contact {
        margin-top: 2rem;
        padding-top: 1.5rem;
        border-top: 1px solid #f5f5f4;
      }

      .contact p {
        font-size: 0.8125rem;
        color: #a8a29e;
        margin-bottom: 0.25rem;
      }
      .contact a {
        color: #b45309;
        text-decoration: none;
        font-weight: 500;
      }
      .contact a:hover {
        text-decoration: underline;
      }

      .status-dot {
        display: inline-block;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #ef4444;
        margin-right: 0.4rem;
        animation: pulse 1.5s ease-in-out infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.3;
        }
      }

      @media (prefers-color-scheme: dark) {
        body {
          background: #0c0a09;
          color: #e7e5e4;
        }
        .card {
          background: #1c1917;
          border-color: #292524;
        }
        h1 {
          color: #fafaf9;
        }
        p {
          color: #a8a29e;
        }
        .contact {
          border-color: #292524;
        }
        .contact p {
          color: #78716c;
        }
      }
    </style>
  </head>
  <body>
    <div class="card" data-testid="offline-page">
      <div class="icon-wrap">
        <svg
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <line x1="1" y1="1" x2="23" y2="23" />
          <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55" />
          <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39" />
          <path d="M10.71 5.05A16 16 0 0 1 22.56 9" />
          <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88" />
          <path d="M8.53 16.11a6 6 0 0 1 6.95 0" />
          <circle cx="12" cy="20" r="1" />
        </svg>
      </div>

      <h1>You're offline</h1>
      <p>
        No internet connection detected. Check your network and try again — or continue browsing
        cached content.
      </p>

      <div class="pill-row">
        <span class="pill">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
            <polyline points="22 4 12 14.01 9 11.01" />
          </svg>
          Cached pages available
        </span>
        <span class="pill">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
            <circle cx="12" cy="12" r="10" />
            <polyline points="12 6 12 12 16 14" />
          </svg>
          Changes will sync
        </span>
      </div>

      <button class="btn" onclick="tryReload()" data-testid="offline-retry-btn">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
          <polyline points="23 4 23 10 17 10" />
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10" />
        </svg>
        Try again
      </button>

      <div class="contact">
        <p><span class="status-dot"></span>Currently offline</p>
        <p>
          Need urgent assistance?
          <a href="tel:+255000000000">Call reception</a> ·
          <a href="#" id="contact-email">Contact support</a>
        </p>
      </div>
    </div>

    <script>
      function tryReload() {
        window.location.href = "/";
      }

      // Auto-retry when connection is restored
      window.addEventListener("online", function () {
        window.location.href = "/";
      });

      // Populate branding from API when online, or from cache
      (function () {
        var emailEl = document.getElementById("contact-email");
        fetch("/api/branding")
          .then(function (r) {
            return r.json();
          })
          .catch(function () {
            return null;
          })
          .then(function (b) {
            if (!b) return;
            document.title = "Offline \u2013 " + b.appName;
            if (b.contactEmail && emailEl) {
              emailEl.href = "mailto:" + b.contactEmail;
              emailEl.textContent = b.contactEmail;
            }
          });
      })();
    </script>
  </body>
</html>
