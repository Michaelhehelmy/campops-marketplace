<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline — CampOps</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #0f172a;
        color: #f1f5f9;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 2rem;
      }
      .icon {
        font-size: 4rem;
        margin-bottom: 1.5rem;
      }
      h1 {
        font-size: 1.75rem;
        font-weight: 700;
        margin-bottom: 0.75rem;
      }
      p {
        color: #94a3b8;
        max-width: 360px;
        line-height: 1.6;
        margin-bottom: 2rem;
      }
      button {
        background: #3b82f6;
        color: white;
        border: none;
        border-radius: 8px;
        padding: 0.75rem 2rem;
        font-size: 1rem;
        cursor: pointer;
        transition: background 0.2s;
      }
      button:hover {
        background: #2563eb;
      }
    </style>
  </head>
  <body>
    <div class="icon">🏕️</div>
    <h1>You're offline</h1>
    <p>
      It looks like you've lost your internet connection. Please check your connection and try
      again.
    </p>
    <button onclick="window.location.reload()">Try again</button>
  </body>
</html>
