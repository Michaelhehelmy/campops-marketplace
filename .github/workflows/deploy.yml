name: Production Deployment

on:
  push:
    branches: [main, 'tenant/**']

jobs:
  deploy-oracle:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - name: Build
        run: |
          npm install
          cp .env.production .env.local
          npm run build
          bash scripts/fix-standalone.sh
      - name: Deploy to Oracle
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ORACLE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          rsync -avz -e "ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no" .next/standalone/ ubuntu@${{ secrets.ORACLE_IP }}:~/marketplace/
          rsync -avz -e "ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no" .next/static/ ubuntu@${{ secrets.ORACLE_IP }}:~/marketplace/.next/static/
          rsync -avz -e "ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no" public/ ubuntu@${{ secrets.ORACLE_IP }}:~/marketplace/public/
          rsync -avz -e "ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no" plugins/ ubuntu@${{ secrets.ORACLE_IP }}:~/marketplace/plugins/
          scp -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no .env.production nginx-unified.conf scripts/boot.sh scripts/deploy-prod.sh ecosystem.config.js ubuntu@${{ secrets.ORACLE_IP }}:~/marketplace/
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no ubuntu@${{ secrets.ORACLE_IP }} "cd ~/marketplace && bash scripts/deploy-prod.sh && bash scripts/backup-s3.sh"
      - name: Post-deploy health check
        run: |
          for i in {1..15}; do
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" https://sinaicamps.com/api/health)
            [ "$HTTP" = "200" ] && echo "✅ Health check passed" && exit 0
            echo "Attempt $i: HTTP $HTTP, retrying..."
            sleep 5
          done
          echo "❌ Health check failed" && exit 1

  deploy-cloudflare:
    if: startsWith(github.ref, 'refs/heads/tenant/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Tenant Frontend
        env:
          TENANT_ID: ${{ github.ref_name }}
          API_URL: https://api.sinaicamps.com
          NODE_ENV: production
        run: |
          npm install
          npm run build
      - name: Publish to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: campops-tenant
          directory: .next
