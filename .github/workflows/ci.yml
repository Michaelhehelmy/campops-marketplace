# OpenCode Workspace CI/CD Pipeline
# Multi-language continuous integration
# Generated from workspace.config.json

name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  test:
    name: Test on $
    runs-on: $
    
    strategy:
      matrix:
        os: [ubuntu-latest]
        
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm install
        
      - name: Run linter
        run: npm run lint
        
      - name: Run type check
        run: npm run type-check
        
      - name: Run tests
        run: npm test
        
      - name: Run build
        run: npm run build
        
      - name: Security audit
        run: npm audit --audit-level=high
        continue-on-error: false
      
      
      
      
      
      
      
      
      

  deploy:
    name: Deploy to 
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    environment: 
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Deploy application
        run: |
          echo "Deploying SinaiCamps to ..."
          .&#x2F;scripts&#x2F;deploy-sinaicamps.sh
        env:
          SSH_KEY: $
