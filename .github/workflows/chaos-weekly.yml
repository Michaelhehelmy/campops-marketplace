name: Weekly Chaos Tests
on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  chaos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run chaos test suite
        run: |
          chmod +x scripts/chaos-test.sh
          bash scripts/chaos-test.sh || true

      - name: Verify build still works
        run: npm run build
