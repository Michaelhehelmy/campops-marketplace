# Production Nginx Configuration for SinaiCamps Marketplace
# Handles wildcard subdomains and SSL termination

# HTTP (80) -> HTTPS (443) redirect
server {
    listen 80;
    listen [::]:80;
    server_name .sinaicamps.com; # Replace with your actual domain

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS (443) Server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name .sinaicamps.com; # Replace with your actual domain

    # SSL Certificate Configuration (Certbot paths)
    ssl_certificate /etc/letsencrypt/live/sinaicamps.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sinaicamps.com/privkey.pem;

    # SSL Security Hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # HSTS (Strict-Transport-Security)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Other Security Headers
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://challenges.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' data: https://fonts.gstatic.com; frame-src 'self' https://challenges.cloudflare.com; connect-src 'self' https://*.sinaicamps.com http://localhost:3000 http://localhost:3001 http://127.0.0.1:3001;" always;

    # Proxy Configuration to Next.js (Standalone)
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts for long-running plugin requests
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
    }

    # Static file caching
    location /_next/static {
        proxy_cache_valid 200 60m;
        proxy_pass http://localhost:3000;
        expires 365d;
        access_log off;
    }

    location /public {
        proxy_pass http://localhost:3000;
        expires 30d;
        access_log off;
    }
}
